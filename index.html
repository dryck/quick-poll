<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exit Ticket Express | Quick Check</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 5px;
      font-size: 1.8rem;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
      font-size: 0.95rem;
    }
    
    /* Presets */
    .presets-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: block;
    }
    .presets {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .preset-btn {
      padding: 12px 20px;
      border: 2px solid #667eea;
      background: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.3rem;
      transition: all 0.2s ease;
    }
    .preset-btn:hover, .preset-btn.active {
      background: #667eea;
      transform: translateY(-2px);
    }
    .preset-btn.active {
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    /* Question */
    .question-input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1.2rem;
      margin-bottom: 20px;
      font-family: inherit;
    }
    .question-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    /* Voting Section */
    .voting-section {
      margin: 30px 0;
    }
    .current-question {
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    
    /* Big Voting Buttons */
    .vote-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .vote-btn {
      padding: 40px 20px;
      font-size: 3rem;
      border: 4px solid #e0e0e0;
      background: white;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .vote-btn .label {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
    }
    .vote-btn:hover {
      transform: scale(1.05);
      border-color: #667eea;
    }
    .vote-btn:active {
      transform: scale(0.98);
    }
    .vote-btn.voted {
      background: #d4edda;
      border-color: #28a745;
    }
    
    /* Counter */
    .counter {
      text-align: center;
      font-size: 1.3rem;
      color: #667eea;
      font-weight: 600;
      margin: 20px 0;
      padding: 15px;
      background: #e8f4f8;
      border-radius: 12px;
    }
    
    /* Results */
    .results {
      margin-top: 30px;
    }
    .result-bar {
      margin-bottom: 15px;
      background: #ecf0f1;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      height: 60px;
    }
    .result-fill {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      transition: width 0.5s ease;
    }
    .result-emoji {
      font-size: 1.5rem;
    }
    
    /* Controls */
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }
    .control-btn {
      padding: 15px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-start {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-reset {
      background: #e74c3c;
      color: white;
    }
    .btn-reset:hover {
      background: #c0392b;
    }
    
    /* Hidden by default */
    .voting-section, .results { display: none; }
    .setup-section { display: block; }
    
    /* Fullscreen toggle */
    .fullscreen-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.9);
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      z-index: 1000;
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .vote-btn { font-size: 2rem; padding: 30px 15px; }
      .current-question { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
  
  <div class="container">
    <h1>🎫 Exit Ticket Express</h1>
    <p class="subtitle">Быстрая проверка в конце урока</p>
    
    <!-- Setup Section -->
    <div class="setup-section" id="setupSection">
      <label class="presets-label">Выберите тип:</label>
      <div class="presets">
        <button class="preset-btn" onclick="setPreset('understanding')" title="Понимание">🟢🟡🔴</button>
        <button class="preset-btn" onclick="setPreset('mood')" title="Настроение">😊😐😢</button>
        <button class="preset-btn" onclick="setPreset('rating')" title="Рейтинг">⭐⭐⭐⭐⭐</button>
        <button class="preset-btn" onclick="setPreset('speed')" title="Темп">🐢🐕🐇</button>
        <button class="preset-btn" onclick="setPreset('confidence')" title="Уверенность">💪🤷🙈</button>
      </div>
      
      <input type="text" class="question-input" id="questionInput" 
             placeholder="Введите вопрос (например: Тема сегодня была понятна?)">
      
      <div class="controls">
        <button class="control-btn btn-start" onclick="startVoting()">▶️ Начать голосование</button>
      </div>
    </div>
    
    <!-- Voting Section -->
    <div class="voting-section" id="votingSection">
      <div class="current-question" id="displayQuestion"></div>
      
      <div class="counter" id="counter">
        Проголосовало: <span id="voteCount">0</span> учеников
      </div>
      
      <div class="vote-buttons" id="voteButtons"></div>
      
      <div class="controls">
        <button class="control-btn btn-reset" onclick="resetVoting()">🔄 Новый опрос</button>
      </div>
      
      <div class="results" id="resultsSection"></div>
    </div>
  </div>

  <script>
    const presets = {
      understanding: {
        question: 'Тема сегодня была понятна?',
        options: [
          { emoji: '🟢', label: 'Да', color: '#28a745' },
          { emoji: '🟡', label: 'Частично', color: '#ffc107' },
          { emoji: '🔴', label: 'Нет', color: '#dc3545' }
        ]
      },
      mood: {
        question: 'Как вы себя чувствуете?',
        options: [
          { emoji: '😊', label: 'Хорошо', color: '#28a745' },
          { emoji: '😐', label: 'Нормально', color: '#ffc107' },
          { emoji: '😢', label: 'Плохо', color: '#dc3545' }
        ]
      },
      rating: {
        question: 'Оцените урок от 1 до 5:',
        options: [
          { emoji: '⭐', label: '1', color: '#dc3545' },
          { emoji: '⭐⭐', label: '2', color: '#fd7e14' },
          { emoji: '⭐⭐⭐', label: '3', color: '#ffc107' },
          { emoji: '⭐⭐⭐⭐', label: '4', color: '#17a2b8' },
          { emoji: '⭐⭐⭐⭐⭐', label: '5', color: '#28a745' }
        ]
      },
      speed: {
        question: 'Как быстро вы поняли тему?',
        options: [
          { emoji: '🐢', label: 'Медленно', color: '#dc3545' },
          { emoji: '🐕', label: 'Нормально', color: '#ffc107' },
          { emoji: '🐇', label: 'Быстро', color: '#28a745' }
        ]
      },
      confidence: {
        question: 'Насколько вы уверены в знаниях?',
        options: [
          { emoji: '💪', label: 'Уверен', color: '#28a745' },
          { emoji: '🤷', label: 'Не уверен', color: '#ffc107' },
          { emoji: '🙈', label: 'Путаюсь', color: '#dc3545' }
        ]
      }
    };
    
    let currentPreset = null;
    let votes = {};
    let totalVotes = 0;
    
    function setPreset(type) {
      currentPreset = presets[type];
      document.getElementById('questionInput').value = currentPreset.question;
      
      // Highlight active preset
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }
    
    function startVoting() {
      const question = document.getElementById('questionInput').value.trim();
      if (!question) {
        alert('Пожалуйста, введите вопрос!');
        return;
      }
      
      if (!currentPreset) {
        // Default to understanding if no preset selected
        currentPreset = presets.understanding;
      }
      
      // Update question if user changed it
      currentPreset = JSON.parse(JSON.stringify(currentPreset));
      currentPreset.question = question;
      
      // Reset votes
      votes = {};
      totalVotes = 0;
      currentPreset.options.forEach(opt => votes[opt.label] = 0);
      
      // Show voting section
      document.getElementById('setupSection').style.display = 'none';
      document.getElementById('votingSection').style.display = 'block';
      document.getElementById('displayQuestion').textContent = question;
      
      // Create vote buttons
      const buttonsContainer = document.getElementById('voteButtons');
      buttonsContainer.innerHTML = '';
      currentPreset.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'vote-btn';
        btn.innerHTML = `
          <span class="emoji">${option.emoji}</span>
          <span class="label">${option.label}</span>
        `;
        btn.onclick = () => castVote(option);
        buttonsContainer.appendChild(btn);
      });
      
      updateDisplay();
    }
    
    function castVote(option) {
      votes[option.label]++;
      totalVotes++;
      
      // Visual feedback
      event.target.classList.add('voted');
      setTimeout(() => event.target.classList.remove('voted'), 300);
      
      // Sound feedback
      playSound();
      
      updateDisplay();
    }
    
    function updateDisplay() {
      document.getElementById('voteCount').textContent = totalVotes;
      
      // Show results
      const resultsSection = document.getElementById('resultsSection');
      resultsSection.style.display = 'block';
      resultsSection.innerHTML = '';
      
      currentPreset.options.forEach(option => {
        const count = votes[option.label] || 0;
        const percentage = totalVotes > 0 ? (count / totalVotes * 100).toFixed(0) : 0;
        
        const bar = document.createElement('div');
        bar.className = 'result-bar';
        bar.innerHTML = `
          <div class="result-fill" style="width: ${percentage}%; background: ${option.color};">
            <span class="result-emoji">${option.emoji}</span>
            <span>${count} (${percentage}%)</span>
          </div>
        `;
        resultsSection.appendChild(bar);
      });
    }
    
    function resetVoting() {
      document.getElementById('setupSection').style.display = 'block';
      document.getElementById('votingSection').style.display = 'none';
      document.getElementById('questionInput').value = '';
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      currentPreset = null;
      votes = {};
      totalVotes = 0;
    }
    
    function playSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.15);
      } catch(e) {
        // Audio not supported
      }
    }
    
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  </script>
</body>
</html>
